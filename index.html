<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="Styles/headerYFooter.css">
    <link rel="stylesheet" href="Styles/inicio.css">
    <link rel="stylesheet" href="Styles/index.css">
    <title>Iniciar Sesión</title>

<body>
    <header>
        <nav class="nav_header">
            <div class="logo-perfil-container">
                <img class="img_header" src="Imagenes/fondo-transparente.png" alt="PasajesAereos Logo" width="100">
            </div>
            <ul class="ul_header">
                <li class="li_header"><a href="pages/registrarse.html">Registrate ahora!</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="seccion-iniciar-sesion">    
            <h1>Iniciar Sesión</h1>
            <form class="form-iniciar-sesion" action="pages/inicio.html">
                <div class="campo-formulario">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>
                </div>
                <div class="campo-formulario">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <a href="pages/recuperar-contra.html">¿Olvidaste la contraseña?</a>
                <button type="submit" class="btn-iniciar-sesion">Iniciar Sesión</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="footer-contenido">
            <div class="footer-columna">
                <h4>Legal</h4>
                <ul>
                    <li><a href="https://www.google.com/search?q=Terminos+y+Condiciones" target="_blank">Términos &amp; Condiciones</a></li>

                    <li><a href="https://www.google.com/search?q=Cookie+Policy" target="_blank">Cookie Policy</a></li>
                </ul>
            </div>
            <div class="footer-columna">
                <h4>Contacto</h4>
                <p>volaya@pasajesaereos.com</p>
                <img src="Imagenes/fondo-transparente.png" alt="PasajesAereos Logo" class="img-footer-logo">
            </div>
            <div class="footer-columna">
                <h4>Programación Web 1</h4>
                <p>Grupo 2</p>
                <p>2624 - Com:02-3900</p>
            </div>
            <div class="footer-columna">
                <h4>Integrantes</h4>
                <div class="footer-team">
                    <ul>
                        <li>Axel</li>
                        <li>Ariel</li>
                        <li>Bautista</li>
                    </ul>

                        <li>Leandro</li>
                        <li>Rocio</li>

        </div>
