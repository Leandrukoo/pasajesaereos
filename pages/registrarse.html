<body>
<header>
        <nav class="nav_header">
            <div class="logo-perfil-container">
                <img class="img_header" src="../Imagenes/fondo-transparente.png" alt="PasajesAereos Logo" width="100">
            </div>
        </nav>
    </header>











    <main>
        <h1>Registrarse</h1>
        <form class="formulario" action="../index.html">
            <section class="datosUsuario">
                <div class="nombreUsuario">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" placeholder="Apellido" required>
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Correo Electrónico" required>
                    <label for="dni">DNI:</label>
                    <input type="number" id="dni" name="dni" placeholder="DNI" required>

                </div>
                <div class="contraseña">
                    <label for="telefono">Teléfono:</label>
                    <input type="number" id="telefono" name="telefono" placeholder="Teléfono" required>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña" required>
                    <label for="confirm_password">Confirmar Contraseña:</label> 
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirmar Contraseña" required>
                </div>
            </section>
            <section class="metodoPago">

            </section>
            <div class="botones">
            <button type="submit" class="btn">Confirmar</button>
            <button type="button" id="cancelar" class="btn" onclick="window.location.href='../index.html'">Cancelar</button>
            </div>
        </form>
