<body>
    <header>

    <main>
        <section class="seccion-recuperar-contra">    
            <h1>Recuperar Contraseña</h1>
            <form class="form-recuperar-contra" action="../index.html">
                <div class="campo-formulario">
                    <label for="username"><h3>Nombre de Usuario:</h3></label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu nombre de usuario" required>
                    <label for="email"><h3>Correo Electrónico:</h3></label>
                    <input type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>
                </div>
                <div class="botones">
                <button type="submit" class="btn-recuperar-contra">Enviar</button>
                <button type="button" id="cancelar" class="button_pagar" onclick="window.location.href='../index.html'">Cancelar</button>
                </div>
            </form>
        </section>
